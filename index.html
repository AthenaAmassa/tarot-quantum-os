<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Athena Amass @ Arche Ω</title>
    <style>
        body { background-color: #0a0a0c; color: #e0e0e0; font-family: 'Courier New', monospace; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app-container { border: 2px solid #ffd700; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        h1 { color: #ffd700; font-size: 1.5em; text-transform: uppercase; letter-spacing: 3px; }
        #resultat { margin: 30px 0; min-height: 100px; padding: 15px; border: 1px solid #333; }
        button { background: transparent; border: 1px solid #00f2ff; color: #00f2ff; padding: 15px 30px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #00f2ff; color: #0a0a0c; }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>Arche Ω : Tirage Quantique</h1>
        <div id="resultat">Sélectionnez une fréquence pour débuter.</div>
        <button onclick="tirerCarte()">EXTRAIRE LA FRÉQUENCE</button>
    </div>

    <script>
        const deck = [
            { nom: "Le Magicien", freq: "888Hz", desc: "Manifestation souveraine" },
            { nom: "La Grande Prêtresse", freq: "1944Hz", desc: "Intuition cristalline" },
            { nom: "L'Impératrice", freq: "528Hz", desc: "Création infinie" },
            { nom: "Le Hiérophante", freq: "741Hz", desc: "Sagesse ancestrale" }
        ];

        function tirerCarte() {
            const index = Math.floor(Math.random() * deck.length);
            const carte = deck[index];
            const div = document.getElementById('resultat');
            // Correction des balises d'affichage dynamique avec les accents graves `
            div.innerHTML = `<h3>${carte.nom}</h3><p>Résonance : ${carte.freq}</p><p>Code : ${carte.desc}</p>`;
            console.log(`[SYS] Flux : ${carte.nom} // ${carte.freq}`);
        }
    </script>
</body>
</html>
