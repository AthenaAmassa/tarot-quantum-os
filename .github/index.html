<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Arche Ω — Intégrale 60 Arcanes</title>
<meta name="description" content="Codex complet Arche Omega : 60 arcanes, de GritHz à MontrerHz. Forge, tirage, analyse.">
<style>
  :root {
    --bg: #0a0a0c;
    --bg2: #0f0f12;
    --gold: #ffd700;
    --cyan: #00f2ff;
    --red: #ff0044;
    --text: #e8e8e8;
    --text-dim: #888;
  }
  * { box-sizing: border-box; font-family: 'Courier New', ui-monospace, monospace; }
  body { 
    background: var(--bg); 
    color: var(--text); 
    margin: 0; 
    background-image: 
      radial-gradient(circle at 20% 30%, #00f2ff08 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, #ffd70008 0%, transparent 50%);
    min-height: 100vh;
  }
  header { 
    border-bottom: 2px solid var(--cyan); 
    padding: 15px 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    background: #000a;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  h1 { color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 3px; }
  .stats { font-size: 12px; color: var(--cyan); }
  .stats span { margin-left: 15px; }
  
  main { max-width: 1800px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
  
  .panel { 
    border: 1px solid var(--cyan); 
    background: var(--bg2);
    padding: 15px;
    box-shadow: 0 0 20px #00f2ff11;
  }
  .panel h2 { color: var(--cyan); margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 8px; }
  
  /* CODEX GRID */
  .codex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-height: 80vh; overflow-y: auto; }
  
  /* CARTE */
  .carte { 
    width: 100%; 
    aspect-ratio: 350/600;
    border: 3px solid var(--gold); 
    background: linear-gradient(180deg, #0a0a0c 0%, #1a1a1f 100%);
    position: relative;
    padding: 12px;
    box-shadow: 0 0 40px #ffd70033, inset 0 0 60px #00f2ff11;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
  }
  .carte:hover { transform: scale(1.02); box-shadow: 0 0 60px #ffd70055; }
  .carte::before { content: ''; position: absolute; inset: 5px; border: 1px solid var(--cyan); opacity: 0.6; pointer-events: none; }
  .freq { color: var(--cyan); text-align: center; font-size: 10px; letter-spacing: 2px; }
  .titre { color: var(--gold); text-align: center; font-size: 13px; margin: 8px 0; text-transform: uppercase; line-height: 1.2; }
  .code { text-align: center; font-size: 9px; opacity: 0.8; margin-bottom: 8px; }
  .effet { border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); padding: 4px 0; text-align: center; font-weight: bold; color: var(--cyan); font-size: 9px; }
  .lore { font-size: 8px; line-height: 1.3; margin: 8px 0; height: 55%; overflow-y: auto; white-space: pre-wrap; }
  .signature { position: absolute; bottom: 8px; right: 12px; color: var(--gold); font-size: 8px; font-style: italic; }
  .numero { position: absolute; bottom: 8px; left: 12px; color: var(--cyan); font-size: 10px; }
  
  /* PANNEAU DROIT */
  button { 
    background: var(--gold); 
    color: #000; 
    border: none; 
    padding: 10px; 
    width: 100%; 
    margin-top: 10px; 
    font-weight: bold; 
    cursor: pointer; 
    transition: 0.2s;
    font-size: 12px;
  }
  button:hover { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
  button.ghost { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
  .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  
  /* TIRAGE */
  .tirage-result { margin: 15px 0; padding: 15px; border: 1px solid var(--gold); background: #000; font-size: 11px; max-height: 300px; overflow-y: auto; text-align: left; }
  
  /* ANALYSE */
  .analyse { font-size: 11px; line-height: 1.6; }
  .analyse b { color: var(--gold); }
  .analyse .bar { height: 3px; background: var(--cyan); margin: 4px 0 8px 0; }
  
  /* TOAST */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--cyan); color: #000; padding: 10px 15px; font-size: 12px; font-weight: bold; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  
  /* MODAL */
  .modal { position: fixed; inset: 0; background: #000e; backdrop-filter: blur(10px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal.show { display: flex; }
  .modal-carte { width: 90%; max-width: 500px; aspect-ratio: 350/600; }
  .modal-close { position: absolute; top: 20px; right: 20px; background: var(--red); color: #fff; border: none; width: 40px; height: 40px; font-size: 20px; cursor: pointer; z-index: 210; }
  
  @media (max-width: 1200px) { main { grid-template-columns: 1fr; } }
</style>
</head>
